<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PROJECT_NAME}} — System Map</title>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.3.1",
            "react/": "https://esm.sh/react@18.3.1/",
            "react-dom": "https://esm.sh/react-dom@18.3.1",
            "react-dom/": "https://esm.sh/react-dom@18.3.1/",
            "@xyflow/react": "https://esm.sh/@xyflow/react@12?external=react,react-dom",
            "@xyflow/system": "https://esm.sh/@xyflow/system@12?external=react,react-dom"
        }
    }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xyflow/react@12/dist/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: rgba(15, 20, 30, 0.74);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #3b82f6;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --purple: #a855f7;
            --cyan: #22d3ee;
            --green: #22c55e;
            --orange: #f97316;
            --pink: #ec4899;
            --red: #ef4444;
            --yellow: #eab308;
            --glass: blur(12px) saturate(180%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 28px;
            gap: 18px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
        }

        .brand-card,
        .stats-grid,
        .details-panel {
            background: var(--card-bg);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
        }

        .brand-card {
            width: min(540px, 58vw);
            border-radius: 24px;
            padding: 20px 22px;
            pointer-events: auto;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .brand-card.collapsed {
            width: auto;
            padding: 10px 18px;
            cursor: pointer;
        }

        .brand-card.collapsed .brand-body { display: none; }
        .brand-card.collapsed .brand-toggle { transform: rotate(180deg); }

        .brand-toggle {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            transition: transform 0.3s ease, background 0.2s;
            font-size: 14px;
            line-height: 1;
        }

        .brand-toggle:hover { background: rgba(255,255,255,0.1); color: var(--text); }

        .brand-card h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.6px;
            line-height: 1.05;
        }

        .brand-card .eyebrow {
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.1px;
            margin-bottom: 8px;
        }

        .brand-card .subline {
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            margin-top: 8px;
        }

        .brand-card .summary-list {
            list-style: none;
            padding: 0;
            margin: 12px 0 0 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .brand-card .summary-list li {
            color: var(--text-dim);
            font-size: 13px;
            line-height: 1.5;
            padding-left: 14px;
            position: relative;
        }

        .brand-card .summary-list li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: 700;
        }

        .stats-grid {
            display: flex;
            gap: 12px;
            padding: 10px;
            border-radius: 20px;
            pointer-events: auto;
        }

        .mini-card {
            min-width: 112px;
            padding: 12px 16px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .mini-card .val {
            font-size: 22px;
            font-weight: 800;
            line-height: 1;
        }

        .mini-card .lbl {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-top: 7px;
        }

        .details-panel {
            position: absolute;
            right: 28px;
            bottom: 28px;
            width: 390px;
            max-height: calc(100vh - 210px);
            border-radius: 24px;
            padding: 22px;
            pointer-events: auto;
            transform: translateY(18px);
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
        }

        .details-panel.active { transform: translateY(0); opacity: 1; }
        .details-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .details-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .pill {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            border-radius: 999px;
            padding: 5px 9px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
        }

        .details-body {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.65;
        }

        .details-section {
            margin-top: 14px;
        }

        .details-section h3 {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.9px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .evidence-list {
            padding-left: 18px;
            color: var(--text-dim);
            font-size: 13px;
            line-height: 1.55;
        }

        .file-tag {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255,255,255,0.05);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            color: var(--cyan);
            display: inline-block;
        }

        .rf-wrapper {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, #111827 0%, #05070a 100%);
        }

        .react-flow__edge { cursor: pointer; }
        .react-flow__edge-path { stroke: rgba(59, 130, 246, 0.24); stroke-width: 2; }
        .react-flow__edge.animated .react-flow__edge-path {
            stroke: var(--accent);
            stroke-opacity: 0.65;
            stroke-dasharray: 5;
            animation: dash 1s linear infinite;
        }

        .react-flow__edge-text {
            fill: #e2e8f0;
            font-size: 11px;
            font-weight: 700;
        }

        .react-flow__edge-textbg {
            fill: rgba(8, 15, 24, 0.92);
            stroke: rgba(255, 255, 255, 0.08);
        }

        @keyframes dash { from { stroke-dashoffset: 10; } to { stroke-dashoffset: 0; } }

        .node-base {
            padding: 15px 16px;
            border-radius: 20px;
            background: var(--card-bg);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            color: var(--text);
            min-width: 200px;
            max-width: 240px;
            transition: all 0.25s ease;
        }

        .node-base:hover {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.15);
        }

        .node-pipeline {
            border: 1px solid rgba(59,130,246,0.3);
            box-shadow: 0 0 24px rgba(59,130,246,0.12), 0 0 48px rgba(59,130,246,0.06);
        }

        .node-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
        .node-icon {
            width: 34px;
            height: 34px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex: 0 0 auto;
        }

        .node-title { font-weight: 700; font-size: 14px; }
        .node-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
        .node-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 10px;
        }

        .tag {
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 999px;
            background: rgba(255,255,255,0.1);
        }

        .react-flow__background {
            background-image: radial-gradient(#1e293b 1px, transparent 0);
            background-size: 40px 40px;
        }

        .hint,
        .footer-tag {
            position: absolute;
            bottom: 28px;
            font-size: 11px;
            color: var(--text-dim);
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.48);
            border-radius: 999px;
            padding: 8px 14px;
        }

        .hint { left: 50%; transform: translateX(-50%); }
        .footer-tag { left: 28px; opacity: 0.75; }
    </style>
</head>
<body>

<div class="overlay">
    <div class="header">
        <div class="brand-card" id="brand-card">
            <button class="brand-toggle" id="brand-toggle" title="Collapse / Expand">&#9650;</button>
            <div class="eyebrow">System Architecture Map</div>
            <h1>{{PROJECT_TITLE_HTML}}</h1>
            <div class="brand-body">
                <div class="subline">{{PROJECT_SUBTITLE}}</div>
                <ul class="summary-list">
                    {{OVERVIEW_BULLETS}}
                </ul>
            </div>
        </div>
        <div class="stats-grid">
            {{STATS_CARDS}}
        </div>
    </div>

    <div class="details-panel" id="details">
        <div class="details-title" id="det-title">{{DETAILS_DEFAULT_TITLE}}</div>
        <div class="details-meta" id="det-meta"></div>
        <div class="details-body" id="det-body">{{DETAILS_DEFAULT_BODY}}</div>
        <div class="details-section" id="det-evidence-wrap" style="display:none">
            <h3>Evidence</h3>
            <ul class="evidence-list" id="det-evidence"></ul>
        </div>
        <div class="details-section" id="det-file-wrap" style="display:none">
            <h3>Code</h3>
            <div id="det-file"></div>
        </div>
    </div>

    <div class="hint">Scroll to zoom · Drag to move · Click nodes or edges for evidence</div>
    <div class="footer-tag">{{FOOTER_NOTE}}</div>
</div>

<div class="rf-wrapper" id="rf-root"></div>

<script type="module">
import React, { createElement as h, memo } from 'react';
import { createRoot } from 'react-dom/client';
import { ReactFlow, Background, Controls, Handle, Position, useNodesState, useEdgesState } from '@xyflow/react';

const EngineNode = memo(({ data, id }) => h('div', { className: 'node-base' + (id && id.startsWith('p-') ? ' node-pipeline' : ''), onClick: () => data.onSelect(data) },
    data.hasTarget !== false && h(Handle, { type: 'target', position: Position.Left, style: { background: data.color || 'var(--accent)' } }),
    h('div', { className: 'node-header' },
        h('div', { className: 'node-icon', style: { background: (data.color || '#3b82f6') + '20', color: data.color || '#3b82f6' } }, data.icon || '•'),
        h('div', null,
            h('div', { className: 'node-title' }, data.label),
            h('div', { className: 'node-sub' }, data.sub || '')
        )
    ),
    data.tags && data.tags.length > 0 && h('div', { className: 'node-tags' },
        data.tags.map((tag) => h('span', { className: 'tag', key: tag }, tag))
    ),
    data.hasSource !== false && h(Handle, { type: 'source', position: Position.Right, style: { background: data.color || 'var(--accent)' } })
));

const LaneNode = memo(({ data }) => h('div', { style: {
    width: ((data && data.width) || 1600) + 'px',
    height: ((data && data.height) || 130) + 'px',
    background: 'linear-gradient(90deg, transparent, rgba(59,130,246,0.05) 3%, rgba(59,130,246,0.05) 97%, transparent)',
    borderTop: '1px solid rgba(59,130,246,0.08)',
    borderBottom: '1px solid rgba(59,130,246,0.08)',
    borderRadius: '16px',
    pointerEvents: 'none'
}}));

const nodeTypes = { engine: EngineNode, lane: LaneNode };

const App = () => {
    const renderPill = (meta, value) => {
        if (!value) return;
        const pill = document.createElement('span');
        pill.className = 'pill';
        pill.textContent = value;
        meta.appendChild(pill);
    };

    const showDetails = ({ title, metaValues = [], body = '', evidence = [], file = '' }) => {
        const panel = document.getElementById('details');
        document.getElementById('det-title').textContent = title;

        const meta = document.getElementById('det-meta');
        meta.textContent = '';
        metaValues.forEach((value) => renderPill(meta, value));

        document.getElementById('det-body').textContent = body;

        const evidenceWrap = document.getElementById('det-evidence-wrap');
        const evidenceList = document.getElementById('det-evidence');
        evidenceList.textContent = '';
        if (Array.isArray(evidence) && evidence.length > 0) {
            evidence.forEach((item) => {
                const li = document.createElement('li');
                li.textContent = item;
                evidenceList.appendChild(li);
            });
            evidenceWrap.style.display = 'block';
        } else {
            evidenceWrap.style.display = 'none';
        }

        const fileWrap = document.getElementById('det-file-wrap');
        const fileEl = document.getElementById('det-file');
        fileEl.textContent = '';
        if (file) {
            const span = document.createElement('span');
            span.className = 'file-tag';
            span.textContent = file;
            fileEl.appendChild(span);
            fileWrap.style.display = 'block';
        } else {
            fileWrap.style.display = 'none';
        }

        panel.classList.add('active');
    };

    const showNodeDetails = (data) => {
        showDetails({
            title: (data.icon || '•') + ' ' + data.label,
            metaValues: [data.kindLabel, data.confidence && 'Confidence: ' + data.confidence],
            body: data.desc || '',
            evidence: data.evidence || [],
            file: data.file || '',
        });
    };

    const showEdgeDetails = (edge) => {
        const sourceLabel = edge.sourceLabel || edge.source || 'Unknown source';
        const targetLabel = edge.targetLabel || edge.target || 'Unknown target';
        const edgeTitle = edge.label || (sourceLabel + ' -> ' + targetLabel);
        const body = edge.label
            ? (sourceLabel + ' -> ' + targetLabel)
            : ('Connection from ' + sourceLabel + ' to ' + targetLabel + '.');

        showDetails({
            title: edgeTitle,
            metaValues: [edge.kindLabel, edge.confidence && 'Confidence: ' + edge.confidence],
            body,
            evidence: edge.evidence || [],
        });
    };

    const hydrateNode = (node) => node.type === 'lane'
        ? node
        : { ...node, data: { ...node.data, onSelect: showNodeDetails } };

    const initialNodes = {{NODES_JSON}}.map(hydrateNode);
    const initialEdges = {{EDGES_JSON}};

    const [nodes, , onNodesChange] = useNodesState(initialNodes);
    const [edges, , onEdgesChange] = useEdgesState(initialEdges);

    return h(ReactFlow, {
        nodes,
        edges,
        onNodesChange,
        onEdgesChange,
        onEdgeClick: (_, edge) => showEdgeDetails(edge),
        nodeTypes,
        fitView: true,
        colorMode: 'dark',
        onPaneClick: () => document.getElementById('details').classList.remove('active')
    }, h(Background), h(Controls, { showInteractive: false, position: 'bottom-left' }));
};

createRoot(document.getElementById('rf-root')).render(h(App));

// Brand card collapse/expand toggle
const brandCard = document.getElementById('brand-card');
const brandToggle = document.getElementById('brand-toggle');
brandToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    brandCard.classList.toggle('collapsed');
});
brandCard.addEventListener('click', () => {
    if (brandCard.classList.contains('collapsed')) {
        brandCard.classList.remove('collapsed');
    }
});
</script>

</body>
</html>
